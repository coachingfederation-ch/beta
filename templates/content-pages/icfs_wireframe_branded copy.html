const keys=Object.keys(PAGES);
let active='home',open={};

function pill(t,cls){return`<span class="${cls}" style="margin:2px 3px">${t}</span>`}

function sBody(s){
  let h='';
  if(s.headline) h+=`<div class="s-hl">${s.headline}</div>`;
  if(s.body) h+=`<div class="s-body">${s.body}</div>`;
  if(s.deib&&s.name!=='Inclusive coaching note'&&s.name!=='Language & inclusion note'&&s.name!=='DEIB in your practice'&&!s.type?.includes('DEIB')&&s.type!=='DEIB feature'&&s.type!=='DEIB dedicated section'&&s.type!=='DEIB in-context'){
    h+=`<div class="deib-b"><strong>DEIB note:</strong> Inclusive photography and language apply here. Reflect the diversity of our community.</div>`;
  }
  if(s.type?.includes('DEIB')||s.type==='DEIB feature'||s.type==='DEIB dedicated section'||s.type==='DEIB in-context'){
    h+=`<div class="deib-b"><strong>DEIB placement:</strong> This section is a dedicated or highlighted DEIB touchpoint. Use the yellow accent (#efcb30) as a subtle visual signal — not a banner, just warmth.</div>`;
  }
  if(s.note) h+=`<div class="note-b"><strong>Design note:</strong> ${s.note}</div>`;
  if(s.visual) h+=`<div class="vis-b"><strong>Visual:</strong> ${s.visual}</div>`;
  if(s.ctas) h+=`<div style="margin-bottom:8px">${s.ctas.map(c=>pill(c,'pill-navy')).join('')}</div>`;
  if(s.cta) h+=`<div style="margin-bottom:8px">${pill('→ '+s.cta,'pill-blue')}</div>`;
  if(s.stats){
    h+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">`;
    s.stats.forEach(st=>h+=`<div class="stat-box"><div class="stat-v">${st.v}</div><div class="stat-l">${st.l}</div></div>`);
    h+='</div>';
  }
  if(s.cards){
    h+=`<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px">`;
    s.cards.forEach(c=>h+=`<div class="mini-card"><div class="mc-title">${c.t}</div><div class="mc-body">${c.b}</div><span class="mc-cta">→ ${c.cta}</span></div>`);
    h+='</div>';
  }
  if(s.pillars){
    h+=`<div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px">`;
    s.pillars.forEach(p=>h+=`<div class="pillar"><div class="pillar-t">${p.t}</div><div class="pillar-b">${p.b}</div></div>`);
    h+='</div>';
  }
  if(s.board){
    h+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">`;
    s.board.forEach(m=>h+=`<div class="board-c"><div class="board-n">${m.n}</div><div class="board-r">${m.r}</div></div>`);
    h+='</div>';
  }
  if(s.communities){
    h+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">`;
    s.communities.forEach(c=>{
      const a=c.s==='active'||c.s.includes('2026')&&!c.s.includes('coming');
      h+=`<div class="${a?'comm-active':'comm-coming'}"><div class="comm-n">${c.n}</div><div class="comm-l">${c.l}</div><div class="${a?'comm-s-a':'comm-s-c'}">${c.s==='active'?'● Active':c.s}</div></div>`;
    });
    h+='</div>';
  }
  if(s.items){
    h+=`<ul style="margin:0 0 8px 16px">`;
    s.items.forEach(i=>h+=`<li style="font-size:12px;color:#555;margin-bottom:3px;line-height:1.6">${i}</li>`);
    h+='</ul>';
  }
  if(s.tabs){
    s.tabs.forEach(t=>{
      const isDEIB=t.l==='DEIB';
      h+=`<div class="tab-item" style="${isDEIB?'border-left:3px solid #efcb30;border-radius:0 8px 8px 0;background:#fff8e6':''}">
        <div class="tab-l" style="${isDEIB?'color:#7a5c00':''}">${t.l}${isDEIB?' ★':''}</div>
        <div class="tab-b">${t.b}</div></div>`;
    });
  }
  if(s.timeline){
    h+=`<div style="margin-bottom:8px">`;
    s.timeline.forEach(e=>h+=`<div class="tl-row"><span class="tl-d">${e.d}</span><span class="tl-t">${e.t}</span><span class="tl-l">${e.l}</span></div>`);
    h+='</div>';
  }
  if(s.filters){
    h+=`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">`;
    s.filters.forEach((f,i)=>{
      const isDEIB=f==='DEIB';
      h+=`<span style="padding:3px 10px;border-radius:20px;font-size:11px;background:${i===0?'#212251':isDEIB?'#efcb30':'#f8f0e4'};color:${i===0?'#fff':isDEIB?'#212251':'#555'};border:0.5px solid ${i===0?'#212251':isDEIB?'#efcb30':'rgba(33,34,81,0.15)'};font-weight:${isDEIB?700:500}">${f}</span>`;
    });
    h+='</div>';
  }
  if(s.regions){
    h+=`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">`;
    s.regions.forEach(r=>{
      const c=r.includes('coming');
      h+=`<span style="padding:3px 11px;border-radius:20px;font-size:12px;background:${c?'#f8f0e4':'#e8ecff'};color:${c?'#888':'#2b379b'};border:0.5px solid ${c?'rgba(33,34,81,0.12)':'#5778fa44'};font-weight:${c?400:600}">${r}</span>`;
    });
    h+='</div>';
  }
  if(s.fields){
    h+=`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">`;
    s.fields.forEach(f=>{
      const isDEIB=f.includes('DEIB');
      h+=`<span style="padding:3px 10px;background:${isDEIB?'#fff8e6':'#f8f0e4'};border:0.5px solid ${isDEIB?'#efcb3077':'rgba(33,34,81,0.12)'};border-radius:20px;font-size:11px;color:${isDEIB?'#7a5c00':'#555'}">${f}</span>`;
    });
    h+='</div>';
  }
  if(s.steps){
    h+=`<ol style="margin:0 0 8px 16px">`;
    s.steps.forEach(st=>h+=`<li style="font-size:12px;color:#555;margin-bottom:3px;line-height:1.6">${st}</li>`);
    h+='</ol>';
  }
  if(s.creds){
    s.creds.forEach(c=>h+=`<div class="cred-i"><div class="cred-l">${c.l}</div><div class="cred-b">${c.b}</div></div>`);
  }
  return h;
}

function renderSection(pgKey,s,idx){
  const id=pgKey+idx;
  const isOpen=!!open[id];
  const isDEIB=s.deib||s.type?.includes('DEIB')||s.type==='DEIB feature'||s.type==='DEIB dedicated section'||s.type==='DEIB in-context';
  const borderColor=isDEIB?'#efcb30':'#5778fa';
  let body='';
  if(isOpen) body=`<div class="icf-sec-body">${sBody(s)}</div>`;
  const tb=s.type?`<span class="icf-type-badge" style="${isDEIB?'background:#fff8e6;color:#7a5c00':''}">${s.type}</span>`:'<span class="icf-type-badge" style="background:#f8f0e4;color:#888">section</span>';
  return `<div class="icf-sec" style="border-left-color:${borderColor}">
    <button class="icf-sec-head" onclick="tog('${id}')">
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">${tb}<span class="icf-sec-name">${s.name}${isDEIB?' <span style="color:#efcb30;font-size:10px">★ DEIB</span>':''}</span></div>
      <span class="icf-toggle">${isOpen?'−':'+'}</span>
    </button>${body}
  </div>`;
}

function renderPage(){
  const pg=PAGES[active];
  let h='';
  h+=`<div class="icf-pg-head">
    <div class="icf-pg-eyebrow">Page wireframe & content</div>
    <div class="icf-pg-title">${pg.label}</div>
    <div class="icf-pg-note">${pg.note}</div>
  </div>`;
  h+=`<div class="icf-legend">
    <span style="color:#888">Legend:</span>
    <span class="icf-leg-pill" style="background:#fffbeb;border:0.5px solid #efcb3077;color:#7a5c00">Design / UX note</span>
    <span class="icf-leg-pill" style="background:#e8ecff;border:0.5px solid #5778fa55;color:#2b379b">Visual spec</span>
    <span class="icf-leg-pill" style="background:#fff8e6;border:0.5px solid #efcb3077;color:#7a5c00">★ DEIB touchpoint</span>
    <span class="icf-leg-pill" style="background:#f8f0e4;border:0.5px solid rgba(33,34,81,0.12);color:#555">Content block</span>
  </div>`;
  pg.sections.forEach((s,i)=>h+=renderSection(active,s,i));
  h+=`<div class="icf-footer">
    <div class="ft">Brand & build notes</div>
    <div class="fi"><strong>Colours:</strong> Deep Blue #212251 · Blue #2b379b · Light Blue #5778fa · Yellow #efcb30 · Bone #f8f0e4 · White #ffffff</div>
    <div class="fi"><strong>Fonts:</strong> Headlines — Hoss Round Regular (or Nunito as web fallback) · Body — Plus Jakarta Sans</div>
    <div class="fi"><strong>Chapter logo:</strong> ICF mark + "Switzerland" + "Chapter" in teal — use horizontal lockup as primary</div>
    <div class="fi"><strong>Languages:</strong> EN / FR / DE / IT — all key pages need language toggle via Bubble i18n module</div>
    <div class="fi"><strong>DEIB:</strong> ★ sections are DEIB touchpoints. Use yellow (#efcb30) as subtle accent. Diverse photography throughout. DEIB filter on Events page.</div>
    <div class="fi"><strong>Priority pages to build first:</strong> Events · Find a Coach · Become a Member · Home</div>
  </div>`;
  document.getElementById('page-content').innerHTML=h;
}

function renderNav(){
  document.getElementById('nav-btns').innerHTML=keys.map(k=>`<button class="icf-nav-btn${k===active?' on':''}" onclick="setPage('${k}')">${PAGES[k].label}</button>`).join('');
}

window.tog=function(id){open[id]=!open[id];renderPage()};
window.setPage=function(p){active=p;open={};renderNav();renderPage()};

renderNav();renderPage();
</script>
